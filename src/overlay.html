<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkyAlert Overlay</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <!-- Flight container — cloned and animated for each notification -->
  <template id="flight-template">
    <div class="flight-path">
      <div class="airplane-group">
        <!-- Cloud puffs spawn here dynamically -->
        <div class="banner-assembly">
          <div class="banner">
            <div class="banner-fold"></div>
            <span class="banner-emoji">📅</span>
            <span class="banner-text">Event Name</span>
          </div>
          <div class="rope">
            <svg width="60" height="20" viewBox="0 0 60 20">
              <path d="M0 10 Q15 2, 30 10 Q45 18, 60 10" stroke="#F9A8B8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
        <div class="airplane">
          <svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
            <!-- Back Wing (Right) -->
            <path d="M 90,40 L 130,5 L 150,5 L 120,40 Z" fill="#FFD1DC"/>
            <!-- Back Tail Stabilizer -->
            <path d="M 40,40 L 60,15 L 75,15 L 55,40 Z" fill="#FFD1DC"/>
            <!-- Vertical Tail Fin -->
            <path d="M 30,50 L 50,10 L 70,10 L 60,50 Z" fill="#FFB5C2"/>
            
            <!-- Main Body (Chubby) -->
            <path d="M 25,40 L 130,40 C 170,40 185,55 185,70 C 185,85 170,100 130,100 L 25,100 C 10,100 5,85 5,70 C 5,55 10,40 25,40 Z" fill="#FFB5C2"/>
            
            <!-- Cockpit Window -->
            <path d="M 140,40 C 160,40 170,48 175,55 L 140,55 Z" fill="#E8F4FD"/>
            
            <!-- Passenger Windows -->
            <circle cx="60" cy="65" r="6" fill="#E8F4FD"/>
            <circle cx="85" cy="65" r="6" fill="#E8F4FD"/>
            <circle cx="110" cy="65" r="6" fill="#E8F4FD"/>
            
            <!-- Front Wing (Left) -->
            <path d="M 80,85 L 110,135 L 130,135 L 115,85 Z" fill="#FFC8D6"/>
            <!-- Front Tail Stabilizer -->
            <path d="M 35,85 L 50,115 L 65,115 L 55,85 Z" fill="#FFC8D6"/>
            
            <!-- Cute blush and eye -->
            <circle cx="140" cy="75" r="6" fill="#FF9EB5" opacity="0.6"/>
            <circle cx="155" cy="65" r="3.5" fill="#6B5060"/>
            <circle cx="156" cy="63" r="1.5" fill="white"/>
          </svg>
        </div>
      </div>
    </div>
  </template>

  <div id="stage"></div>

  <!-- Kawaii Dog House -->
  <div id="dog-house">
    <svg viewBox="-20 -20 140 122" width="160" height="140">
      <!-- Potted Plant (Right) -->
      <path d="M 105 100 L 95 100 L 97 85 L 103 85 Z" fill="#E67E22" />
      <circle cx="100" cy="80" r="8" fill="#2ECC71" />
      <circle cx="95" cy="75" r="6" fill="#27AE60" />
      <circle cx="105" cy="75" r="6" fill="#27AE60" />

      <!-- Food Bowl (Left) -->
      <path d="M -15 100 C -15 95 5 95 5 100 Z" fill="#FFB5C2" />
      <ellipse cx="-5" cy="95" rx="8" ry="3" fill="#D490A0" />
      <ellipse cx="-5" cy="94" rx="7" ry="2" fill="#E8A0D0" /> <!-- food -->

      <!-- Back shadow/base -->
      <rect x="5" y="95" width="90" height="6" rx="3" fill="#D4B896" />

      <!-- Main Body (Cream wood planks) -->
      <path d="M 10 45 L 10 95 L 90 95 L 90 45 L 50 15 Z" fill="#FFFDF5" />
      <path d="M 25 40 L 25 95 M 40 30 L 40 95 M 60 30 L 60 95 M 75 40 L 75 95" stroke="#F0E8D0" stroke-width="2" stroke-linecap="round" />

      <!-- Inner Dark Room -->
      <path d="M 30 95 L 30 65 C 30 45 70 45 70 65 L 70 95 Z" fill="#2C3E50" />
      <path d="M 35 95 Q 50 85 65 95 Z" fill="#FF9EBB" /> <!-- pillow edge -->

      <!-- Door Arch Border -->
      <path d="M 30 95 L 30 65 C 30 45 70 45 70 65 L 70 95" fill="none" stroke="#E0B589" stroke-width="5" stroke-linecap="round" />

      <!-- Roof (Pastel Pink) -->
      <path d="M 0 50 L 50 10 L 100 50 L 90 58 L 50 25 L 10 58 Z" fill="#FFC8D6" />
      <path d="M 0 50 L 50 10 L 100 50" fill="none" stroke="#FFA6C9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- Paw print above door -->
      <g transform="translate(50, 35) scale(0.6)">
        <path d="M -5 0 C -5 -5 5 -5 5 0 C 5 5 2 8 0 8 C -2 8 -5 5 -5 0 Z" fill="#FFA6C9" />
        <circle cx="-8" cy="-5" r="2.5" fill="#FFA6C9" />
        <circle cx="-3" cy="-10" r="2.5" fill="#FFA6C9" />
        <circle cx="3" cy="-10" r="2.5" fill="#FFA6C9" />
        <circle cx="8" cy="-5" r="2.5" fill="#FFA6C9" />
      </g>
    </svg>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
